<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Organische Chemie AR — v3 (Barcode, Layout b)</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin:0; overflow:hidden; font-family:-apple-system,system-ui,sans-serif; }
    #hinweis { position:fixed; left:50%; bottom:22px; transform:translateX(-50%); z-index:10;
      background:rgba(20,20,26,.82); color:#fff; padding:.6em 1em; border-radius:999px;
      font-size:.9rem; max-width:90vw; text-align:center; pointer-events:none; }
  </style>
</head>
<body>
  <div id="hinweis">v3 · Layout b — halte Methan &amp; Propanon gleichzeitig in die Kamera. Größe justieren: ?s=1.5</div>
  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="colorManagement: true; physicallyCorrectLights: true; logarithmicDepthBuffer: true; antialias: true; precision: highp; sortObjects: true"
    arjs="trackingMethod: best; sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 4x4_BCH_13_9_3; debugUIEnabled: false;">
    <a-assets>
      <a-asset-item id="m_methan" src="../models/methan.glb"></a-asset-item>
      <a-asset-item id="m_propanon" src="../models/propanon.glb"></a-asset-item>
    </a-assets>

    <!-- ID 0 = Methan (Alkane) · Marker in der Ecke, Modell schwebt über der Kartenmitte -->
    <a-marker type="barcode" value="0">
      <a-gltf-model class="mol" data-base="0.45" src="#m_methan"
        position="0 0 0.3" rotation="0 0 0" scale="0.45 0.45 0.45"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 9000; easing: linear"></a-gltf-model>
    </a-marker>

    <!-- ID 27 = Propanon (Ketone) -->
    <a-marker type="barcode" value="27">
      <a-gltf-model class="mol" data-base="0.45" src="#m_propanon"
        position="0 0 0.3" rotation="0 0 0" scale="0.45 0.45 0.45"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 9000; easing: linear"></a-gltf-model>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
  <script>
    // ?s=1.5 skaliert ALLE Modelle (Geräte-Kalibrierung)
    var f = parseFloat(new URLSearchParams(location.search).get('s'));
    if (f && f > 0) window.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.mol').forEach(function(m) {
        var b = parseFloat(m.getAttribute('data-base')) * f;
        m.setAttribute('scale', b + ' ' + b + ' ' + b);
      });
    });
  </script>
</body>
</html>
