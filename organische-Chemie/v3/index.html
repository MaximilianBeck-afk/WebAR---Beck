<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Organische Chemie AR — v3 (Barcode, Layout a + Gesten)</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
  <script>
    // --- Touch-Gesten: 1 Finger = drehen, 2 Finger = zoomen (kein Verschieben) ---
    AFRAME.registerComponent("gesture-detector", {
      schema: { element: { default: "" } },
      init: function () {
        this.targetElement = (this.data.element && document.querySelector(this.data.element)) || this.el;
        this.internalState = { previousState: null };
        this.emitGestureEvent = this.emitGestureEvent.bind(this);
        this.targetElement.addEventListener("touchstart", this.emitGestureEvent);
        this.targetElement.addEventListener("touchend", this.emitGestureEvent);
        this.targetElement.addEventListener("touchmove", this.emitGestureEvent);
      },
      emitGestureEvent: function (event) {
        const currentState = this.getTouchState(event);
        const previousState = this.internalState.previousState;
        const gestureContinues = previousState && currentState && currentState.touchCount == previousState.touchCount;
        const gestureEnded = previousState && !gestureContinues;
        const gestureStarted = currentState && !gestureContinues;
        if (gestureEnded) {
          this.el.emit(this.getEventPrefix(previousState.touchCount) + "fingerend", previousState);
          this.internalState.previousState = null;
        }
        if (gestureStarted) {
          currentState.startPosition = currentState.position;
          currentState.startSpread = currentState.spread;
          this.el.emit(this.getEventPrefix(currentState.touchCount) + "fingerstart", currentState);
          this.internalState.previousState = currentState;
        }
        if (gestureContinues) {
          const detail = { positionChange: {
              x: currentState.position.x - previousState.position.x,
              y: currentState.position.y - previousState.position.y } };
          if (currentState.spread) detail.spreadChange = currentState.spread - previousState.spread;
          Object.assign(previousState, currentState);
          Object.assign(detail, previousState);
          this.el.emit(this.getEventPrefix(currentState.touchCount) + "fingermove", detail);
        }
      },
      getTouchState: function (event) {
        if (event.touches.length === 0) return null;
        const touches = [];
        for (let i = 0; i < event.touches.length; i++) touches.push(event.touches[i]);
        const cx = touches.reduce((s, t) => s + t.clientX, 0) / touches.length;
        const cy = touches.reduce((s, t) => s + t.clientY, 0) / touches.length;
        const scale = 2 / (window.innerWidth + window.innerHeight);
        const st = { touchCount: touches.length, position: { x: cx * scale, y: cy * scale } };
        if (touches.length >= 2) {
          const spread = touches.reduce((s, t) => s + Math.hypot(t.clientX - cx, t.clientY - cy), 0) / touches.length;
          st.spread = spread * scale;
        }
        return st;
      },
      getEventPrefix: function (n) { return ["one", "two", "three", "many"][Math.min(n, 4) - 1]; },
    });

    AFRAME.registerComponent("gesture-handler", {
      schema: { rotationFactor: { default: 6 }, minScale: { default: 0.15 }, maxScale: { default: 8 } },
      init: function () {
        this.handleRotation = this.handleRotation.bind(this);
        this.handleScale = this.handleScale.bind(this);
        this.initialScale = this.el.object3D.scale.clone();
        this.scaleFactor = 1;
        this.el.sceneEl.addEventListener("onefingermove", this.handleRotation);
        this.el.sceneEl.addEventListener("twofingermove", this.handleScale);
      },
      handleRotation: function (e) {
        this.el.object3D.rotation.y += e.detail.positionChange.x * this.data.rotationFactor;
        this.el.object3D.rotation.x += e.detail.positionChange.y * this.data.rotationFactor;
      },
      handleScale: function (e) {
        this.scaleFactor *= 1 + e.detail.spreadChange / e.detail.startSpread;
        this.scaleFactor = Math.min(Math.max(this.scaleFactor, this.data.minScale), this.data.maxScale);
        this.el.object3D.scale.set(
          this.scaleFactor * this.initialScale.x,
          this.scaleFactor * this.initialScale.y,
          this.scaleFactor * this.initialScale.z);
      },
    });
  </script>
  <style>
    body { margin:0; overflow:hidden; font-family:-apple-system,system-ui,sans-serif; }
    #hinweis { position:fixed; left:50%; bottom:22px; transform:translateX(-50%); z-index:10;
      background:rgba(20,20,26,.82); color:#fff; padding:.6em 1em; border-radius:999px;
      font-size:.9rem; max-width:90vw; text-align:center; pointer-events:none; }
  </style>
</head>
<body>
  <div id="hinweis">v3 · Layout a + Gesten — 1 Finger drehen · 2 Finger zoomen. Größe: ?s=1.5</div>
  <a-scene
    embedded
    gesture-detector
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="colorManagement: true; physicallyCorrectLights: true; logarithmicDepthBuffer: true; antialias: true; precision: highp; sortObjects: true"
    arjs="trackingMethod: best; sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 4x4_BCH_13_9_3; debugUIEnabled: false;">
    <a-assets>
      <a-asset-item id="m_methan" src="../models/methan.glb"></a-asset-item>
      <a-asset-item id="m_propanon" src="../models/propanon.glb"></a-asset-item>
    </a-assets>

    <!-- Layout a: Marker in der Ecke, Modell schwebt über der Kartenmitte -->
    <a-marker type="barcode" value="0">
      <a-gltf-model class="mol" data-base="1.5" gesture-handler src="#m_methan"
        position="-2.42 4.00 1.5" rotation="0 0 0" scale="1.5 1.5 1.5"></a-gltf-model>
    </a-marker>

    <a-marker type="barcode" value="27">
      <a-gltf-model class="mol" data-base="1.5" gesture-handler src="#m_propanon"
        position="-2.42 4.00 1.5" rotation="0 0 0" scale="1.5 1.5 1.5"></a-gltf-model>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
  <script>
    // ?s=1.5 setzt die Start-Größe ALLER Modelle (Geräte-Kalibrierung; Pinch justiert danach live)
    var f = parseFloat(new URLSearchParams(location.search).get('s'));
    if (f && f > 0) window.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.mol').forEach(function(m) {
        var b = parseFloat(m.getAttribute('data-base')) * f;
        m.setAttribute('scale', b + ' ' + b + ' ' + b);
      });
    });
  </script>
</body>
</html>
