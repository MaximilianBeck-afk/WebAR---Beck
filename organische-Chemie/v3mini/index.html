<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Organische Chemie AR — v3wb (Tracking auf Woodblock-Bild)</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>body{margin:0;font-family:-apple-system,system-ui,sans-serif}
#hinweis{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:5;background:rgba(20,20,26,.82);color:#fff;padding:.6em 1em;border-radius:999px;font-size:.9rem;max-width:90vw;text-align:center;pointer-events:none}</style>
</head><body>
<div id="hinweis">v3wb — Tracking auf dem Molekül-Bild. Halte die Karten (Bildmitte) in die Kamera.</div>
<a-scene mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 5; autoStart: true; uiLoading: yes; uiScanning: yes; uiError: yes; filterMinCF: 0.01; filterBeta: 30"
  color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
  <a-assets>
      <a-asset-item id="m0" src="../models/methan.glb"></a-asset-item>
      <a-asset-item id="m1" src="../models/ethan.glb"></a-asset-item>
      <a-asset-item id="m2" src="../models/propan.glb"></a-asset-item>
      <a-asset-item id="m3" src="../models/ethanol.glb"></a-asset-item>
  </a-assets>
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model class="mol" data-base="0.312" src="#m0" position="0 0 0.05" rotation="0 0 0"
        scale="0.312 0.312 0.312" animation="property: rotation; to: 0 360 0; loop: true; dur: 9000; easing: linear"></a-gltf-model>
    </a-entity>
    <a-entity mindar-image-target="targetIndex: 1">
      <a-gltf-model class="mol" data-base="0.237" src="#m1" position="0 0 0.05" rotation="0 0 0"
        scale="0.237 0.237 0.237" animation="property: rotation; to: 0 360 0; loop: true; dur: 9000; easing: linear"></a-gltf-model>
    </a-entity>
    <a-entity mindar-image-target="targetIndex: 2">
      <a-gltf-model class="mol" data-base="0.175" src="#m2" position="0 0 0.05" rotation="0 0 0"
        scale="0.175 0.175 0.175" animation="property: rotation; to: 0 360 0; loop: true; dur: 9000; easing: linear"></a-gltf-model>
    </a-entity>
    <a-entity mindar-image-target="targetIndex: 3">
      <a-gltf-model class="mol" data-base="0.2" src="#m3" position="0 0 0.05" rotation="0 0 0"
        scale="0.2 0.2 0.2" animation="property: rotation; to: 0 360 0; loop: true; dur: 9000; easing: linear"></a-gltf-model>
    </a-entity>
</a-scene>
<script>
var f=parseFloat(new URLSearchParams(location.search).get('s'));
if(f&&f>0)window.addEventListener('DOMContentLoaded',function(){document.querySelectorAll('.mol').forEach(function(m){var b=parseFloat(m.getAttribute('data-base'))*f;m.setAttribute('scale',b+' '+b+' '+b);});});
</script>
</body></html>
