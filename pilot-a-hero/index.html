<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Pilot A — Hero „Ethansäure erkunden" (Test)</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
  <script src="./gestures.js"></script>
  <script src="./ar-interactive.js"></script>
  <style>
    body { margin:0; overflow:hidden; font-family:-apple-system,system-ui,sans-serif; }
    #hinweis { position:fixed; left:50%; bottom:22px; transform:translateX(-50%); z-index:10;
      background:rgba(20,20,26,.82); color:#fff; padding:.6em 1em; border-radius:999px;
      font-size:.88rem; max-width:90vw; text-align:center; pointer-events:none; }
  </style>
</head>
<body>
  <!-- PILOT A (Test-Deploy in WebAR---Beck) — reiches „Hero"-Erlebnis: HUD-Kapitel, Tap-Hotspots,
       Info-Panels, Beschriftungs-Modus. Barcode-Marker 43 (Ethansäure). Positionen sind Näherungen. -->
  <div id="ar-hud">
    <button data-chapter="uebersicht" class="active" onclick="arChapter('uebersicht')">Übersicht</button>
    <button data-chapter="saeure" onclick="arChapter('saeure')">Säuregruppe</button>
    <button data-chapter="rest" onclick="arChapter('rest')">Methylrest</button>
    <button data-chapter="alle" onclick="arChapter('alle')">Beschriftung</button>
  </div>
  <div id="hinweis">Kamera auf die Karte richten · Menü oben wählen · leuchtende Punkte antippen</div>

  <a-scene
    embedded
    tap-picker
    ar-labels
    gesture-detector
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="colorManagement: true; physicallyCorrectLights: true; logarithmicDepthBuffer: true; antialias: true; precision: highp; sortObjects: true"
    arjs="trackingMethod: best; sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 4x4_BCH_13_9_3; debugUIEnabled: false;">
    <a-assets>
      <a-asset-item id="m_saeure" src="models/ethansaeure.glb"></a-asset-item>
    </a-assets>

    <a-marker type="barcode" value="43">
      <a-entity class="mol-group" data-base="0.5" gesture-handler position="0 0 0.3" scale="0.5 0.5 0.5">
        <a-gltf-model src="#m_saeure"></a-gltf-model>

        <a-entity hotspot="
          group: saeure;
          title: Carboxygruppe (–COOH);
          text: Die funktionelle Gruppe der Carbonsäuren. Sie besteht aus einer Carbonyl- (C=O) und einer Hydroxygruppe (O–H) am selben C-Atom und gibt in Wasser ein Proton ab.;
          fact: Wusstest du? Deshalb reagiert Ethansäure sauer — verdünnt (ca. 5 %) kennst du sie als Speiseessig.;
          label: –COOH; color: #ff4d67" position="0.85 0.5 0"></a-entity>

        <a-entity hotspot="
          group: saeure;
          title: Carbonylgruppe (C=O);
          text: Die C=O-Doppelbindung ist stark polar. Das positivierte C-Atom ist das Angriffsziel bei Additions- und Substitutions-Reaktionen (z. B. Veresterung).;
          label: C=O; color: #ffb03a" position="0.55 -0.15 0.35"></a-entity>

        <a-entity hotspot="
          group: saeure;
          title: Hydroxygruppe (O–H);
          text: Über diese O–H-Bindung wird das Proton abgegeben. Der zurückbleibende Carboxylat-Rest wird durch Mesomerie stabilisiert.;
          label: O–H; color: #ff7ab0" position="1.05 -0.1 -0.15"></a-entity>

        <a-entity hotspot="
          group: rest;
          title: Methylgruppe (–CH₃);
          text: Der unpolare Kohlenwasserstoff-Rest. Er beeinflusst die Säurestärke nur schwach — die Reaktivität sitzt in der Carboxygruppe.;
          label: –CH₃; color: #4db6ff" position="-0.9 -0.15 0"></a-entity>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    var f = parseFloat(new URLSearchParams(location.search).get('s'));
    if (f && f > 0) window.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.mol-group').forEach(function (m) {
        var b = parseFloat(m.getAttribute('data-base')) * f;
        m.setAttribute('scale', b + ' ' + b + ' ' + b);
      });
    });
    document.querySelector('a-scene').addEventListener('loaded', function () { arChapter('uebersicht'); });
  </script>
</body>
</html>
